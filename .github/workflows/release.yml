name: Build and Release

on:
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from VERSION file
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

  build-macos:
    runs-on: macos-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set version from VERSION file
        run: npm version $(cat VERSION | tr -d '[:space:]') --no-git-tag-version --allow-same-version

      - name: Import certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12

      - name: Make
        run: npm run make
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: out/make/**/*

  build-linux:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set version from VERSION file
        run: npm version $(cat VERSION | tr -d '[:space:]') --no-git-tag-version --allow-same-version

      - name: Make
        run: npm run make

      - uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: out/make/**/*

  build-windows:
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set version from VERSION file
        run: |
          $version = (Get-Content VERSION).Trim()
          npm version $version --no-git-tag-version --allow-same-version

      - name: Make
        run: npm run make

      - uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: out/make/**/*

  release:
    runs-on: ubuntu-latest
    needs: [version, build-macos, build-linux, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Copier ${{ needs.version.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true

  update-homebrew:
    needs: [version, release]
    uses: ./.github/workflows/update-homebrew-tap.yml
    with:
      tag: v${{ needs.version.outputs.version }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
